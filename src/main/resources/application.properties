spring.application.name=goblin-fashion-engine-api
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Transitional endpoint fallback for /api/hoards/{hoardId}/shinies.
app.default-goblin-id=GBL-001

# Firebase Admin + Firestore.
# For Cloud Run, use ADC. For local development, either use GOOGLE_APPLICATION_CREDENTIALS
# or set firebase.credentials-path to a service account json path.
firebase.credentials-path=
firebase.project-id=

# Optional legacy JSON to Firestore bootstrap importer.
app.bootstrap.legacy-inventory.enabled=false
app.bootstrap.legacy-inventory.only-if-empty=true
app.bootstrap.legacy-inventory.goblin-id=
app.bootstrap.legacy-inventory.hoard-id=
